# R CMD check for the rmoriebricklayer package, which lives in the bricklayer/
# subdirectory. Installs deps for that subdir, roxygenises (generates NAMESPACE
# + man), then checks. Node 24 actions (checkout@v5).
name: r-pkg-check

on:
  push:
    branches: [main]
    paths: ['bricklayer/**', '.github/workflows/r-pkg-check.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bricklayer
          extra-packages: any::rcmdcheck, any::roxygen2
          cache: 'always'
          cache-version: 1
      - name: Roxygenise (generate NAMESPACE + man)
        run: Rscript -e 'roxygen2::roxygenise("bricklayer"); cat("EXPORTS:", sum(grepl("^export", readLines("bricklayer/NAMESPACE"))), "\n")'
      - name: R CMD check
        run: Rscript -e 'rcmdcheck::rcmdcheck("bricklayer", args = c("--no-manual", "--as-cran"), error_on = "error")'
